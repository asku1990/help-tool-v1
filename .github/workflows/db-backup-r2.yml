name: Database Backup to R2

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: read

concurrency:
  group: db-backup-r2
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install backup dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common python3-pip
          printf '\n' | sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          python3 -m pip install --user awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run backup script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_REGION: ${{ secrets.R2_REGION }}
          R2_PREFIX: ${{ secrets.R2_PREFIX }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          BACKUP_KEEP_LOCAL: '0'
        run: ./scripts/backup-to-r2.sh
